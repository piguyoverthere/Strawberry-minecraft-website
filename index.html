<!DOCTYPE html>
<html>
  <head>
    <title>Strawberry minecraft installation</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      p, .norm {
        color: rgb(0, 137, 175);
      }
      h1 {
        color: rgb(74, 190, 207);
      }
      .button {
        border: none;
        color: white;
        padding: 8px 16px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 20px;
        margin: 4px 2px;
        transition-duration: 0.4s;
        cursor: pointer;
      }
      .acquire {
        background-color: white; 
        color: black; 
        border: 2px solid #008CBA;
      }
      .acquire:hover {
        background-color: #008CBA;
        color: white;
      }
      .info-box {
        background-color: #e0f7fa; 
        padding: 20px;             
        border-radius: 8px;        
        margin-bottom: 20px;       
      }
    </style>
  </head>
  <body>
    
    <div class="info-box">
      <h1>About</h1>
      <nav>
        <a href="/install.html">Install</a>
        <a href="/about.html">About</a>
        <a href="/pricing.html">Pricing</a>
        <a href="/index.html">Home</a>
      </nav>
    </div>
    
    <br>
    
    <p>Strawberry minecraft is a minecraft mod containing community requested features
      and features we believe will improve the overall experience. This mod is scheduled
      to release to the public in July 2029, but delays may occur.
    </p>
    
    <div>
      <button onclick="purchase()" class="button acquire" type="button">pre-order</button>
    </div>
    
    <p>$0.00</p>
    <script>
      const email = ["placeholder",""];
      function purchase() {
        console.log("Button clicked!");
        
        let username = prompt("Enter an email you would like the add-on file sent to:");
        if (username === null) {
          return; 
        }
        if (username.includes("@")) {
          email.push(username)
          console.log("ok");
          alert("Success");
          console.log(email) // remove this line later or else the emails would be leaked
        } else {
          console.log("Invalid email");
          alert("Invalid email");
        }
      }
    </script>
  </body>
</html>
